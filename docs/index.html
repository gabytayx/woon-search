<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woning Alert Amsterdam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --rood: #E8372A;
    --rood-zacht: #FDF0EF;
    --donker: #111111;
    --grijs-1: #F5F5F5;
    --grijs-2: #E8E8E8;
    --grijs-3: #999999;
    --groen: #1A7A4A;
    --groen-zacht: #EAF5EF;
    --tekst: #222222;
    --kaart-bg: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--grijs-1);
    color: var(--tekst);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--donker);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: white;
    letter-spacing: -0.3px;
  }

  .logo span {
    color: var(--rood);
  }

  .header-meta {
    font-size: 12px;
    color: #888;
    text-align: right;
  }

  .header-meta strong {
    color: white;
    display: block;
    font-size: 13px;
  }

  /* ── Hero-balk ── */
  .hero {
    background: var(--donker);
    padding: 32px 32px 40px;
    border-bottom: 3px solid var(--rood);
  }

  .hero-titel {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    color: white;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }

  .hero-titel span {
    color: var(--rood);
  }

  .hero-sub {
    font-size: 14px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #ccc;
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 12px;
    white-space: nowrap;
  }

  /* ── Stats balk ── */
  .stats-balk {
    background: white;
    border-bottom: 1px solid var(--grijs-2);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .stat-getal {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--donker);
  }

  .stat-getal.nieuw {
    color: var(--rood);
  }

  .stat-label {
    font-size: 12px;
    color: var(--grijs-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-scheidslijn {
    width: 1px;
    height: 28px;
    background: var(--grijs-2);
  }

  /* ── Filterbar ── */
  .filterbar {
    padding: 16px 32px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filterbar label {
    font-size: 12px;
    color: var(--grijs-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }

  .filter-btn {
    background: white;
    border: 1px solid var(--grijs-2);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    color: var(--tekst);
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--donker); }

  .filter-btn.actief {
    background: var(--donker);
    border-color: var(--donker);
    color: white;
  }

  .zoek-input {
    background: white;
    border: 1px solid var(--grijs-2);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--tekst);
    min-width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }

  .zoek-input:focus { border-color: var(--donker); }

  /* ── Grid ── */
  .grid-container {
    padding: 0 32px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .sectie-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 24px 0 16px;
  }

  .sectie-titel {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--grijs-3);
  }

  .sectie-lijn {
    flex: 1;
    height: 1px;
    background: var(--grijs-2);
  }

  .woningen-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── Kaart ── */
  .kaart {
    background: var(--kaart-bg);
    border: 1px solid var(--grijs-2);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
  }

  .kaart:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  .kaart.is-nieuw {
    border-color: var(--rood);
    border-width: 2px;
  }

  .kaart-nieuw-badge {
    background: var(--rood);
    color: white;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .kaart-nieuw-badge::before {
    content: "";
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .kaart-body {
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .kaart-bron {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--grijs-3);
  }

  .kaart-titel {
    font-size: 15px;
    font-weight: 600;
    color: var(--donker);
    line-height: 1.3;
  }

  .kaart-details {
    font-size: 12px;
    color: var(--grijs-3);
    line-height: 1.5;
  }

  .kaart-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--grijs-1);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .kaart-prijs {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--donker);
  }

  .kaart-link {
    background: var(--donker);
    color: white;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 8px;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .kaart-link:hover { background: var(--rood); }

  /* ── Leeg state ── */
  .leeg {
    text-align: center;
    padding: 64px 32px;
    color: var(--grijs-3);
  }

  .leeg-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }

  /* ── Laden ── */
  .laden {
    text-align: center;
    padding: 80px 32px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--grijs-2);
    border-top-color: var(--rood);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .laden-tekst {
    font-size: 14px;
    color: var(--grijs-3);
  }

  /* ── Footer ── */
  footer {
    background: var(--donker);
    color: #555;
    text-align: center;
    padding: 24px;
    font-size: 12px;
  }

  footer a { color: #888; text-decoration: none; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    header { padding: 16px 20px; }
    .hero { padding: 24px 20px 32px; }
    .stats-balk { padding: 14px 20px; gap: 20px; }
    .filterbar { padding: 12px 20px; }
    .grid-container { padding: 0 20px 40px; }
    .woningen-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Woning<span>Alert</span></div>
  <div class="header-meta">
    <strong id="bijgewerkt-header">Laden...</strong>
    Amsterdam · Elk uur bijgewerkt
  </div>
</header>

<div class="hero">
  <h1 class="hero-titel">Huurwoningen<br><span>Amsterdam</span></h1>
  <div class="hero-sub">
    <span class="pill">Max €4.000 /mnd</span>
    <span class="pill">3+ slaapkamers</span>
    <span class="pill">Appartement · Woonhuis</span>
    <span class="pill">15 bronnen</span>
  </div>
</div>

<div class="stats-balk">
  <div class="stat">
    <div class="stat-getal nieuw" id="stat-nieuw">—</div>
    <div class="stat-label">Nieuw</div>
  </div>
  <div class="stat-scheidslijn"></div>
  <div class="stat">
    <div class="stat-getal" id="stat-totaal">—</div>
    <div class="stat-label">Totaal</div>
  </div>
  <div class="stat-scheidslijn"></div>
  <div class="stat">
    <div class="stat-getal" id="stat-bronnen">15</div>
    <div class="stat-label">Bronnen</div>
  </div>
  <div class="stat-scheidslijn"></div>
  <div class="stat" style="margin-left: auto;">
    <div class="stat-label" id="bijgewerkt-stat" style="font-size:13px; color: #666;">Laden...</div>
  </div>
</div>

<div class="filterbar">
  <label>Filter:</label>
  <button class="filter-btn actief" onclick="setFilter('alles', this)">Alles</button>
  <button class="filter-btn" onclick="setFilter('nieuw', this)">Alleen nieuw</button>
  <div class="stat-scheidslijn" style="height:20px;"></div>
  <label>Bron:</label>
  <select class="zoek-input" id="bron-filter" onchange="renderWoningen()" style="min-width:140px; border-radius:8px;">
    <option value="">Alle bronnen</option>
  </select>
  <input class="zoek-input" id="zoek" placeholder="Zoek op adres of buurt..." oninput="renderWoningen()">
</div>

<div class="grid-container">
  <div id="app">
    <div class="laden">
      <div class="spinner"></div>
      <div class="laden-tekst">Woningen ophalen...</div>
    </div>
  </div>
</div>

<footer>
  Woning Alert Amsterdam &nbsp;·&nbsp; Automatisch bijgewerkt elk uur via GitHub Actions
  &nbsp;·&nbsp; <a href="https://github.com" target="_blank">Bekijk broncode</a>
</footer>

<script>
let alleWoningen = [];
let huidigFilter = 'alles';

async function laadData() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    if (!r.ok) throw new Error('Geen data');
    const data = await r.json();
    alleWoningen = data.woningen || [];

    // Stats
    document.getElementById('stat-nieuw').textContent  = data.nieuw ?? 0;
    document.getElementById('stat-totaal').textContent = data.aantal ?? 0;
    document.getElementById('bijgewerkt-stat').textContent = 'Bijgewerkt: ' + (data.bijgewerkt || '');
    document.getElementById('bijgewerkt-header').textContent = data.bijgewerkt || '';

    // Bron dropdown vullen
    const bronnen = [...new Set(alleWoningen.map(w => w.bron))].sort();
    const sel = document.getElementById('bron-filter');
    bronnen.forEach(b => {
      const o = document.createElement('option');
      o.value = b; o.textContent = b;
      sel.appendChild(o);
    });

    renderWoningen();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="leeg">
        <span class="leeg-icon">🏗️</span>
        <strong>Data nog niet beschikbaar</strong><br><br>
        De eerste scan is nog niet gedraaid. Ga naar je GitHub repo →
        Actions → "Woning Alert Scan" → "Run workflow".
      </div>`;
  }
}

function setFilter(filter, btn) {
  huidigFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('actief'));
  btn.classList.add('actief');
  renderWoningen();
}

function renderWoningen() {
  const zoek     = document.getElementById('zoek').value.toLowerCase();
  const bronFilt = document.getElementById('bron-filter').value;

  let lijst = alleWoningen.filter(w => {
    if (huidigFilter === 'nieuw' && !w.nieuw) return false;
    if (bronFilt && w.bron !== bronFilt) return false;
    if (zoek) {
      const haystack = (w.titel + w.details + w.bron).toLowerCase();
      if (!haystack.includes(zoek)) return false;
    }
    return true;
  });

  const nieuweWoningen  = lijst.filter(w => w.nieuw);
  const overigeWoningen = lijst.filter(w => !w.nieuw);

  if (!lijst.length) {
    document.getElementById('app').innerHTML = `
      <div class="leeg">
        <span class="leeg-icon">🔍</span>
        Geen woningen gevonden met deze filters.
      </div>`;
    return;
  }

  let html = '';

  if (nieuweWoningen.length) {
    html += `
      <div class="sectie-header">
        <div class="sectie-titel">🔴 Nieuw — ${nieuweWoningen.length} woning${nieuweWoningen.length !== 1 ? 'en' : ''}</div>
        <div class="sectie-lijn"></div>
      </div>
      <div class="woningen-grid">
        ${nieuweWoningen.map(kaartHtml).join('')}
      </div>`;
  }

  if (overigeWoningen.length) {
    html += `
      <div class="sectie-header">
        <div class="sectie-titel">Eerder gezien — ${overigeWoningen.length}</div>
        <div class="sectie-lijn"></div>
      </div>
      <div class="woningen-grid">
        ${overigeWoningen.map(kaartHtml).join('')}
      </div>`;
  }

  document.getElementById('app').innerHTML = html;
}

function kaartHtml(w) {
  const nieuwBadge = w.nieuw
    ? `<div class="kaart-nieuw-badge">Nieuw</div>`
    : '';

  const details = w.details
    ? `<div class="kaart-details">${esc(w.details)}</div>`
    : '';

  return `
    <div class="kaart ${w.nieuw ? 'is-nieuw' : ''}">
      ${nieuwBadge}
      <div class="kaart-body">
        <div class="kaart-bron">${esc(w.bron)}</div>
        <div class="kaart-titel">${esc(w.titel)}</div>
        ${details}
      </div>
      <div class="kaart-footer">
        <div class="kaart-prijs">${esc(w.prijs) || '–'}</div>
        <a class="kaart-link" href="${esc(w.link)}" target="_blank" rel="noopener">
          Bekijk →
        </a>
      </div>
    </div>`;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

laadData();
// Auto-refresh elke 5 minuten
setInterval(laadData, 5 * 60 * 1000);
</script>
</body>
</html>
