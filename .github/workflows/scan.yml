name: Woning Alert Scan

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Europe/Amsterdam

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installeren
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium --with-deps

      - name: Scraper draaien
        run: python scraper/scrape.py

      - name: Resultaten committen
        run: |
          git config user.name  "Woning Alert Bot"
          git config user.email "bot@woning-alert"
          git add docs/data.json docs/gezien.json
          git diff --staged --quiet || git commit -m "🏠 Aanbod bijgewerkt $(date +'%d-%m-%Y %H:%M')"
          git push
